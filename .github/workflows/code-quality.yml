# 代码质量检查
# 检查代码风格、类型安全和潜在问题

name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: 代码风格检查
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: 安装检查工具
        run: |
          pip install flake8 black isort mypy

      - name: 运行flake8检查
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # 忽略一些非关键警告
          flake8 . --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics

      - name: 检查black格式
        run: |
          black --check --diff . || true

      - name: 检查isort导入顺序
        run: |
          isort --check-only --diff . || true

      - name: 运行mypy类型检查
        run: |
          mypy . --ignore-missing-imports || true

  security:
    name: 安全扫描
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          pip install bandit safety

      - name: 运行bandit安全扫描
        run: |
          bandit -r . -ll -ii --exclude tests/ || true

      - name: 检查依赖漏洞
        run: |
          safety check || true
