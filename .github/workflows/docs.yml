# 文档更新检查
# 确保README和文档保持最新

name: Docs

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.py'
      - 'README.md'
  pull_request:
    branches: [ main ]
    paths:
      - '**.py'
      - 'README.md'

jobs:
  check-docs:
    name: 检查文档一致性
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 检查README是否存在
        run: |
          if [ ! -f "README.md" ]; then
            echo "README.md not found!"
            exit 1
          fi
          echo "README.md exists"

      - name: 检查requirements.txt与代码导入一致性
        run: |
          python -c "
          import ast
          import os
          import sys

          # 收集所有Python文件中的import语句
          imports = set()
          for root, dirs, files in os.walk('.'):
              if '.git' in root or '__pycache__' in root:
                  continue
              for file in files:
                  if file.endswith('.py'):
                      filepath = os.path.join(root, file)
                      try:
                          with open(filepath, 'r', encoding='utf-8') as f:
                              tree = ast.parse(f.read())
                          for node in ast.walk(tree):
                              if isinstance(node, ast.Import):
                                  for alias in node.names:
                                      imports.add(alias.name.split('.')[0])
                              elif isinstance(node, ast.ImportFrom):
                                  if node.module:
                                      imports.add(node.module.split('.')[0])
                      except:
                          pass

          # 过滤掉标准库和内部模块
          stdlib = {'os', 'sys', 'json', 're', 'time', 'datetime', 'pathlib', 'typing', 'enum', 'collections', 'sqlite3', 'urllib', 'abc', 'io', 'math', 'random', 'string', 'textwrap', 'copy', 'functools', 'itertools', 'operator', 'contextlib', 'traceback', 'warnings', 'logging', 'unittest', 'argparse', 'subprocess', 'shutil', 'glob', 'fnmatch', 'stat', 'tempfile', 'struct', 'codecs', 'csv', 'configparser', 'hashlib', 'hmac', 'secrets', 'base64', 'binascii', 'zlib', 'gzip', 'bz2', 'lzma', 'zipfile', 'tarfile', 'pickle', 'shelve', 'dbm', 'marshal', 'copyreg', 'pprint', 'reprlib', 'numbers', 'cmath', 'decimal', 'fractions', 'statistics', 'array', 'bisect', 'heapq', 'queue', 'weakref', 'types', 'inspect', 'dis', 'gc', 'atexit', 'signal', 'threading', 'multiprocessing', 'concurrent', 'asyncio', 'socket', 'ssl', 'select', 'selectors', 'asyncore', 'asynchat', 'http', 'ftplib', 'poplib', 'imaplib', 'smtplib', 'xmlrpc', 'ipaddress', 'email', 'html', 'xml', 'webbrowser', 'cgi', 'cgitb', 'wsgiref', 'urllib', 'audioop', 'aifc', 'sunau', 'wave', 'chunk', 'colorsys', 'imghdr', 'sndhdr', 'ossaudiodev', 'turtle', 'cmd', 'readline', 'rlcompleter', 'code', 'codeop', 'pydoc', 'doctest', 'pdb', 'profile', 'timeit', 'trace', 'faulthandler', 'py_compile', 'compileall', 'distutils', 'ensurepip', 'venv', 'zipapp', 'sysconfig', 'builtins', '__future__', 'typing_extensions'}
          internal = {'config', 'agents', 'core', 'utils', 'templates', 'data', 'tests'}

          external_imports = imports - stdlib - internal
          print('外部依赖:', sorted(external_imports))
          "
        continue-on-error: true

      - name: 检查目录结构文档
        run: |
          echo "检查README中的目录结构是否与实际一致..."
          if grep -q "novel_agent/" README.md; then
              echo "目录结构文档存在"
          else
              echo "警告: README中未找到目录结构说明"
          fi
